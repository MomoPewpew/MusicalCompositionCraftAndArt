name: Build and SFTP Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - "data/**"
      - "downloads/**"
      - "scripts/build_examples_manifest.py"
      - "scripts/extract_citations.py"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-mcca-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build examples manifest
        working-directory: .
        run: |
          python3 scripts/extract_citations.py || true
          python3 scripts/build_examples_manifest.py

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

      - name: Install SFTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client sshpass

      - name: Deploy via SFTP (upload out/ → landing/files/)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}
        run: |
          test -d out
          : "${SSH_PORT:=22}"
          # SFTP accounts are usually chrooted to landing/; site files go in landing/files/.
          : "${SSH_TARGET_DIR:=files}"

          SSH_HOST_CLEAN="$(printf %s "${SSH_HOST}" | tr -d '\r\n')"
          SSH_USERNAME_CLEAN="$(printf %s "${SSH_USERNAME}" | tr -d '\r\n')"
          SSH_PASSWORD_CLEAN="$(printf %s "${SSH_PASSWORD}" | tr -d '\r\n')"
          SSH_PORT_CLEAN="$(printf %s "${SSH_PORT}" | tr -d '\r\n')"
          SSH_TARGET_DIR_CLEAN="$(printf %s "${SSH_TARGET_DIR}" | tr -d '\r\n')"

          cat > sftp-batch.txt <<'EOF'
          pwd
          ls
          cd __TARGET_DIR__
          pwd
          ls
          lcd out
          put -r ./*
          bye
          EOF

          sed -i "s|__TARGET_DIR__|${SSH_TARGET_DIR_CLEAN}|g" sftp-batch.txt

          sshpass -p "${SSH_PASSWORD_CLEAN}" \
            sftp -oBatchMode=no -oStrictHostKeyChecking=no -oUserKnownHostsFile=/dev/null \
            -P "${SSH_PORT_CLEAN}" \
            -b sftp-batch.txt \
            "${SSH_USERNAME_CLEAN}@${SSH_HOST_CLEAN}"
